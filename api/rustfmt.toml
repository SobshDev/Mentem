edition = "2024"
max_width = 100
tab_spaces = 4
hard_tabs = false
newline_style = "Unix"
reorder_imports = true
use_field_init_shorthand = true
use_try_shorthand = true

# Nightly-only options (require `cargo +nightly fmt`)
unstable_features = true
brace_style = "AlwaysNextLine"
fn_single_line = false
