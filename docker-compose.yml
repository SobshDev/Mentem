services:
  db:
    build: ./db
    environment:
      POSTGRES_DB: mentem
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mentem"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./api
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PORT: ${PORT:-3000}
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@db:5432/mentem}
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db-data:
